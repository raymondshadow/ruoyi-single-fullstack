# 生产环境覆盖配置
# 部署前请改成真实数据库、Redis、上传目录
ruoyi:
  profile: ./uploadPath-prod

spring:
  datasource:
    druid:
      master:
        url: jdbc:mysql://127.0.0.1:3306/ry-vue-prod?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=Asia/Shanghai
        username: root
        password: password
      slave:
        username: root
        password: password
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 2
      password: 123456

logging:
  level:
    com.ruoyi: info
    org.springframework: warn
