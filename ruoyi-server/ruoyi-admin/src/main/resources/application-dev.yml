# 本地开发环境覆盖配置
ruoyi:
  # 本地文件上传目录，避免使用 Windows / Linux 示例路径
  profile: ./uploadPath

spring:
  datasource:
    druid:
      master:
        url: jdbc:mysql://localhost:3306/spring_boot_demo?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
