apiVersion: v1
kind: Service
metadata:
  name: ruoyi-frontend
  namespace: quiz-ruoyi
spec:
  selector:
    app: ruoyi-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruoyi-frontend
  namespace: quiz-ruoyi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruoyi-frontend
  template:
    metadata:
      labels:
        app: ruoyi-frontend
    spec:
      containers:
        - name: ruoyi-frontend
          image: your-registry/quiz-ruoyi-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
